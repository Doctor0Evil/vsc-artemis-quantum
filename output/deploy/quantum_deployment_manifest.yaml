apiVersion: apps/v1
kind: Deployment
metadata:
  name: pq-crypto-service-deployment
  namespace: vsc-artemis-quantum
  labels:
    component: pq-crypto
    language: rust
    file-reference: "pq_crypto_module.rs"
spec:
  replicas: 5
  selector:
    matchLabels:
      component: pq-crypto
  template:
    metadata:
      labels:
        component: pq-crypto
        sovereignty: aug-citizen-enclave
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9095"
    spec:
      serviceAccountName: quantum-vm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: pq-crypto-container
        image: vsc-artemis/pq-crypto-quantum:2026.03.27
        ports:
        - containerPort: 9095
          name: metrics
        - containerPort: 8445
          name: crypto-rpc
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        env:
        - name: PQ_SIGNATURE_SCHEME
          value: "crystals-dilithium-5"
        - name: KEY_ROTATION_INTERVAL_DAYS
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: KEY_ROTATION_INTERVAL_DAYS
        volumeMounts:
        - name: crypto-keys
          mountPath: /etc/crypto
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: crypto-keys
        secret:
          secretName: quantum-vm-secrets
          defaultMode: 0400
---
apiVersion: v1

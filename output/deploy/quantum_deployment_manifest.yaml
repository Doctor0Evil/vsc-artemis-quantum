          name: metrics
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        env:
        - name: ROH_CAP_LOCAL
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: ROH_CAP_LOCAL
        - name: VECO_CAP_LOCAL
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: VECO_CAP_LOCAL
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-correction-controller-deployment
  namespace: vsc-artemis-quantum
  labels:
    component: error-correction
    language: cpp
    file-reference: "logicalqubit_controller.cpp"
spec:
  replicas: 3
  selector:
    matchLabels:
      component: error-correction

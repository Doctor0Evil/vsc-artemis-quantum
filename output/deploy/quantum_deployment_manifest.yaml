apiVersion: v1
kind: Namespace
metadata:
  name: vsc-artemis-quantum
  labels:
    sovereignty: aug-citizen-enclave
    binding: mt6883-brainip-mandatory
    financial-blacklist: enforced
    spec-version: "2026.03.27"
  annotations:
    grounding-hex: "0x5155465f564d5f455f4a4f554c45533d312e30452d30393b514355424954533d3531323b524f483c302e32303b5645434f3c302e33303b4c5951503d737461626c653b4b46413d30782e3930"
    parent-spec: "quantum-vm-plane-2026-03-27.aln"
    governance-contract: "governance_contract_quantum.aln"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quantum-vm-config
  namespace: vsc-artemis-quantum
data:
  JOULES_PER_GATE_BASE: "1.0e-09"
  ENERGY_THRESHOLD_CRITICAL: "500.0"
  MAX_QUBITS: "512"
  MAX_CIRCUIT_DEPTH: "2048"
  ROH_CAP_LOCAL: "0.20"
  VECO_CAP_LOCAL: "0.30"
  SIGNAL_VALIDITY_WINDOW_MS: "10000"
  CIRCUIT_BREAKER_THRESHOLD: "0.85"
  QKD_SESSION_TIMEOUT_MS: "60000"
  MT6883_HASH_LENGTH: "64"
  PQ_MANDATORY_EPOCH: "1798761600"
  ED25519_DEPRECATION_EPOCH: "1767225600"
  KEY_ROTATION_INTERVAL_DAYS: "90"
  ENCLAVE_LABEL: "aug-citizen-quantum-isolate"
  BLACKLISTED_OPS: "system,popen,socket,fork,exec,malloc_unbound,freopen"
  BLACKLISTED_PATHS: "/tmp,/var/tmp,/dev/shm,/proc/self,/etc/passwd,/etc/shadow"
  BLACKLISTED_WORDS: "finance,trade,crypto-currency,exchange,wallet,token,bank"
  PROMETHEUS_METRICS_PORT: "9090"
  GATEWAY_URL: "https://nexus.vsc-artemis.io"
  LOG_LEVEL: "info"
  HEALTH_CHECK_INTERVAL_MS: "5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: quantum-vm-secrets
  namespace: vsc-artemis-quantum
type: Opaque
stringData:
  mt6883-master-hash: "REPLACE_WITH_ACTUAL_MT6883_HASH_64_BYTES"
  enclave-signing-key: "REPLACE_WITH_ACTUAL_ENCLAVE_KEY"
  qkd-root-cert: "REPLACE_WITH_ACTUAL_QKD_CERTIFICATE"
  pq-crypto-seed: "REPLACE_WITH_ACTUAL_PQ_SEED_VALUE"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantum-vhal-deployment
  namespace: vsc-artemis-quantum
  labels:
    component: vhal
    language: cpp
    file-reference: "quantumvmnode_v2.cpp"
spec:
  replicas: 16
  selector:
    matchLabels:
      component: vhal
  template:
    metadata:
      labels:
        component: vhal
        sovereignty: aug-citizen-enclave
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: quantum-vm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: vhal-container
        image: vsc-artemis/quantum-vhal:2026.03.27
        ports:
        - containerPort: 9090
          name: metrics
        - containerPort: 8443
          name: grpc
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
            ephemeral-storage: "100Gi"
          limits:
            cpu: "8"
            memory: "32Gi"
            ephemeral-storage: "200Gi"
        env:
        - name: MT6883_HASH
          valueFrom:
            secretKeyRef:
              name: quantum-vm-secrets
              key: mt6883-master-hash
        - name: ENCLAVE_LABEL
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: ENCLAVE_LABEL
        - name: JOULES_PER_GATE_BASE
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: JOULES_PER_GATE_BASE
        - name: ENERGY_THRESHOLD_CRITICAL
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: ENERGY_THRESHOLD_CRITICAL
        volumeMounts:
        - name: secure-buffer
          mountPath: /secure
          readOnly: false
        - name: enclave-keys
          mountPath: /etc/enclave
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
      volumes:
      - name: secure-buffer
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
      - name: enclave-keys
        secret:
          secretName: quantum-vm-secrets
          defaultMode: 0400
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: component
                operator: In
                values:
                - vhal
            topologyKey: kubernetes.io/hostname
      nodeSelector:
        mt6883-chipset: "required"
        enclave-capable: "true"
        sovereignty-zone: "aug-citizen"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reality-os-consensus-deployment
  namespace: vsc-artemis-quantum
  labels:
    component: consensus
    language: rust
    file-reference: "consensus_engine_quantum.rs"
spec:
  replicas: 7
  selector:
    matchLabels:
      component: consensus
  template:
    metadata:
      labels:
        component: consensus
        sovereignty: aug-citizen-enclave
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      serviceAccountName: quantum-vm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: consensus-container
        image: vsc-artemis/reality-os-quantum:2026.03.27
        ports:
        - containerPort: 9091
          name: metrics
        - containerPort: 8444
          name: consensus-rpc
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
          limits:
            cpu: "4"
            memory: "16Gi"
        env:
        - name: MT6883_HASH
          valueFrom:
            secretKeyRef:
              name: quantum-vm-secrets
              key: mt6883-master-hash
        - name: PQ_SIGNATURE_SCHEME
          value: "crystals-dilithium-hybrid"
        - name: HYBRID_KEYPAIR_REQUIRED
          value: "true"
        volumeMounts:
        - name: consensus-state
          mountPath: /var/consensus
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: consensus-state
        persistentVolumeClaim:
          claimName: consensus-state-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-gateway-deployment
  namespace: vsc-artemis-quantum
  labels:
    component: gateway
    language: javascript
    file-reference: "nexusconnector_quantum.js"
spec:
  replicas: 5
  selector:
    matchLabels:
      component: gateway
  template:
    metadata:
      labels:
        component: gateway
        sovereignty: aug-citizen-enclave
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"
    spec:
      serviceAccountName: quantum-vm-sa
      containers:
      - name: gateway-container
        image: vsc-artemis/nexus-gateway-quantum:2026.03.27
        ports:
        - containerPort: 9092
          name: metrics
        - containerPort: 443
          name: https
        resources:
          requests:
            cpu: "1"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "8Gi"
        env:
        - name: GATEWAY_URL
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: GATEWAY_URL
        - name: CIRCUIT_BREAKER_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: quantum-vm-config
              key: CIRCUIT_BREAKER_THRESHOLD
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xrgrid-mapper-deployment
  namespace: vsc-artemis-quantum
  labels:
    component: xrgrid-mapper
    language: lua
    file-reference: "xrgridmapper_quantum.lua"
